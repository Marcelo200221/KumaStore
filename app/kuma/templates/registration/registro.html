<!DOCTYPE html>
<html>
<head>
	{% load static %}

	{% load crispy_forms_tags %}
	<title>Registro | Kuma!</title>
	<link rel="stylesheet" type="text/css" href="css/style-registro.css">
	<link href="https://fonts.googleapis.com/css?family=Poppins:600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'CSS/style-registro.css' %}">
	<script src="https://kit.fontawesome.com/a81368914c.js"></script>
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
	<img class="wave" src="{% static 'img/wave.png'%}">
	<div class="container">
		<div class="img">
		</div>
		<div class="register-content">
			<form action="{% url 'registrar' %}" method="post" id="formulario" enctype="multipart/form-data"> 
				{% csrf_token %}
				<h2 class="title">Crear una cuenta</h2>

				<div class="input-div one">
           		   <div class="i">
           		   		<i class="fas fa-user"></i>
           		   </div>
           		   <div class="div">
           		   		<h5>Nombre de usuario</h5>
           		   		<input type="text" class="input" name="username">
           		   </div>
           		</div>

				<div class="input-div pass">
           		   <div class="i"> 
           		    	<i class="fas fa-lock"></i>
           		   </div>
           		   <div class="div">
           		    	<h5>Contraseña</h5>
           		    	<input type="password" id="password1" class="input" name="password1">
            	   </div>
            	</div>

				<div class="input-div pass" id="grupo__password2">
           		   <div class="i"> 
           		    	<i class="fas fa-lock"></i>
           		   </div>
           		   <div class="div">
           		    	<h5>Confirmar Contraseña</h5>
           		    	<input type="password" id="password2" class="input" name="password2">
            	   </div>
            	</div>
				<p id="password2-error" class="formulario__input-error">
					Las contraseñas no coinciden
				</p>

			  	<button type="submit" class="btn">Registrarse</button>
            </form>
        </div>

    <script type="text/javascript" src="{% static 'js/registro.js'%}"></script>
</body>
</html>
